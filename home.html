    <script>

        const slider = document.querySelector(".slider");
        const nextBtn = document.querySelector(".next");
        const prevBtn = document.querySelector(".prev");

        nextBtn.onclick = () => {
            slider.scrollLeft += 300;
        };

        prevBtn.onclick = () => {
            slider.scrollLeft -= 300;
        };


const modeCheckbox = document.getElementById('mode-checkbox');

modeCheckbox.addEventListener('change', () => {
    // เมื่อกดปุ่ม จะทำการสลับคลาส dark-mode ที่ตัว body
    document.body.classList.toggle('dark-mode');
    
    // บันทึกค่าไว้ในเครื่องผู้ใช้ (ปิดเว็บแล้วเปิดใหม่โหมดยังอยู่)
    if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
    } else {
        localStorage.setItem('theme', 'light');
    }
});

// ตรวจสอบค่าที่เคยบันทึกไว้เมื่อโหลดหน้าเว็บ
if (localStorage.getItem('theme') === 'dark') {
    modeCheckbox.checked = true;
    document.body.classList.add('dark-mode');
}
    </script>
