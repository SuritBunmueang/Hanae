    <script>
        // Slider Script
        const slider = document.querySelector(".slider");
        const nextBtn = document.querySelector(".next");
        const prevBtn = document.querySelector(".prev");
        nextBtn.onclick = () => { slider.scrollLeft += 300; };
        prevBtn.onclick = () => { slider.scrollLeft -= 300; };

        // Dark Mode Script
        const modeCheckbox = document.getElementById('mode-checkbox');
        modeCheckbox.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') {
            modeCheckbox.checked = true;
            document.body.classList.add('dark-mode');
        }
        // โค้ดสำหรับจัดการปุ่มแฮมเบอร์เกอร์
const hamburgerBtn = document.getElementById('hamburger-btn');
const navMenu = document.getElementById('nav-menu');

// เมื่อคลิกปุ่ม 3 ขีด ให้สลับคลาส 'show'
hamburgerBtn.addEventListener('click', (event) => {
    event.stopPropagation(); // ป้องกันไม่ให้การคลิกทะลุไปโดนคำสั่งด้านล่าง
    navMenu.classList.toggle('show');
});

// หากคลิกพื้นที่อื่นๆ บนหน้าจอ ให้ปิดเมนูอัตโนมัติ
document.addEventListener('click', (event) => {
    if (!navMenu.contains(event.target) && event.target !== hamburgerBtn) {
        navMenu.classList.remove('show');
    }
});
    </script>
