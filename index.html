<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Hanae Land</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe0f0 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .intro-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        .intro-logo {
            font-size: 70px;
            font-weight: bold;
            color: #ff6fa9;
            margin: 0;
            text-shadow: 2px 5px 15px rgba(255, 111, 169, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .subtitle {
            font-size: 16px;
            color: #f176c0;
            letter-spacing: 4px;
            margin-top: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .enter-btn {
            display: inline-block;
            padding: 16px 45px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #ff6fa9;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255, 111, 169, 0.4);
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #ff5c9f;
            box-shadow: 0 12px 25px rgba(255, 111, 169, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .intro-logo { font-size: 50px; }
            .subtitle { font-size: 14px; }
            .enter-btn { padding: 14px 35px; font-size: 16px; }
        }
    </style>
</head>

<body>

    <div class="intro-container">
        <h1 class="intro-logo">Hanae Land</h1>
        <div class="subtitle">Art & Design Portfolio</div>
        
        <a href="home.html" class="enter-btn">เข้าสู่เว็บไซต์</a>
    </div>

</body>

</html>
