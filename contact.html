<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanae - Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* เพิ่มเติมเล็กน้อยเพื่อให้หน้า Contact ดูสมดุล */
        #contact {
            padding: 100px 20px;
            text-align: center;
            min-height: 70vh; /* ให้เนื้อหาอยู่กลางหน้าจอ */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <h1><a href="index.html" style="text-decoration: none; color: inherit;">hnaa.e</a></h1>
        </div>
        
        <div class="nav-right">
            <div class="hamburger" id="hamburger-btn">
                <i class="fa-solid fa-bars"></i>
            </div>

            <div class="nav-menu" id="nav-menu">
                <a href="home.html#gallery">Art Work</a>
                <a href="contact.html">Contact</a>
                <a href="index.html">Home</a>
            </div>

            <div class="mode-toggle">
                <label class="switch">
                  <input id="mode-checkbox" type="checkbox" />
                  <div class="toggle-slider round">
                    <div class="sun-moon">
                      <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="light-ray-3" class="light-ray" viewBox="0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-5" class="cloud-light" viewBox="0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                      <svg id="cloud-6" class="cloud-light" viewBox="0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                    </div>
                    <div class="stars">
                      <svg id="star-1" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                      <svg id="star-2" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                      <svg id="star-3" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                      <svg id="star-4" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                    </div>
                  </div>
                </label>
            </div>
        </div>
    </nav>

    <section id="contact">
        <h2>ติดต่อสั่งงาน</h2>
        <p>กดปุ่มด้านล่างเพื่อสั่งงานหรือดูผลงานเพิ่มเติม</p>

        <div class="contact-buttons">
            <a href="https://lin.ee/50TADIj" class="line-btn" target="_blank">
                <i class="fa-brands fa-line"></i> สั่งงานผ่าน LINE
            </a>
            <a href="https://www.instagram.com/hnaa.e_?igsh=MWN2c3JiZThodDdzbQ%3D%3D&utm_source=qr" class="ig-btn" target="_blank">
                <i class="fa-brands fa-instagram"></i> ดูผลงานใน Instagram
            </a>
            <a href="https://www.facebook.com/hanae.192619" class="fb-btn" target="_blank">
                <i class="fa-brands fa-facebook"></i> ติดต่อผ่าน Facebook
            </a>
        </div>
    </section>

    <footer>
        <p>© 2026 hnaa.e</p>
    </footer>

    <script>
        // ระบบ Dark Mode
        const modeCheckbox = document.getElementById('mode-checkbox');
        if (modeCheckbox) {
            modeCheckbox.addEventListener('change', () => {
                if (modeCheckbox.checked) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                }
            });
        }

        // ดึงค่าการตั้งค่า Dark mode ล่าสุดเมื่อโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                if (modeCheckbox) modeCheckbox.checked = true;
                document.body.classList.add('dark-mode');
            }
        });

        // ระบบปุ่ม 3 ขีด (Hamburger Menu)
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');

        if (hamburgerBtn && navMenu) {
            hamburgerBtn.addEventListener('click', (event) => {
                event.stopPropagation(); // ป้องกันไม่ให้การคลิกทะลุไปโดนคำสั่งปิดด้านล่าง
                navMenu.classList.toggle('show');
            });

            // หากคลิกพื้นที่อื่นๆ บนหน้าจอ ให้ปิดเมนูอัตโนมัติ
            document.addEventListener('click', (event) => {
                if (!navMenu.contains(event.target) && event.target !== hamburgerBtn) {
                    navMenu.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>
