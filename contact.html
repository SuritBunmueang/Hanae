<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanae - Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* เพิ่มเติมเล็กน้อยเพื่อให้หน้า Contact ดูสมดุล */
        #contact {
            padding: 100px 20px;
            text-align: center;
            min-height: 70vh; /* ให้เนื้อหาอยู่กลางหน้าจอ */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <h1><a href="index.html" style="text-decoration: none; color: inherit;">hnaa.e</a></h1>
        </div>
        <div class="nav-right">
            <a href="home.html#gallery">Art Work</a>
            <a href="contact.html">Contact</a>
            <a href="index.html">Home</a>
            <div class="mode-toggle">
                <label class="switch">
                    <input id="mode-checkbox" type="checkbox" />
                    <div class="toggle-slider round">
                        <div class="sun-moon">
                            </div>
                    </div>
                </label>
            </div>
        </div>
    </nav>

    <section id="contact">
        <h2>ติดต่อสั่งงาน</h2>
        <p>กดปุ่มด้านล่างเพื่อสั่งงานหรือดูผลงานเพิ่มเติม</p>

        <div class="contact-buttons">
            <a href="https://lin.ee/50TADIj" class="line-btn" target="_blank">
                <i class="fa-brands fa-line"></i> สั่งงานผ่าน LINE
            </a>
            <a href="https://www.instagram.com/hnaa.e_?igsh=MWN2c3JiZThodDdzbQ%3D%3D&utm_source=qr" class="ig-btn" target="_blank">
                <i class="fa-brands fa-instagram"></i> ดูผลงานใน Instagram
            </a>
            <a href="https://www.facebook.com/hanae.192619" class="fb-btn" target="_blank">
                <i class="fa-brands fa-facebook"></i> ติดต่อผ่าน Facebook
            </a>
        </div>
    </section>

    <footer>
        <p>© 2026 hnaa.e</p>
    </footer>

    <script>
        // Dark Mode Script
        const modeCheckbox = document.getElementById('mode-checkbox');
        modeCheckbox.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') {
            modeCheckbox.checked = true;
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
